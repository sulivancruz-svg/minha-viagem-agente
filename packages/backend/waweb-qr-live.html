<!doctype html>
<html><head><meta charset="utf-8"><title>WA QR Live</title></head>
<body style="font-family:Segoe UI,Arial,sans-serif;background:#111;color:#eee;text-align:center;padding:16px;">
<h2>WhatsApp QR (auto refresh)</h2>
<p id="t"></p>
<img id="qr" src="waweb-qr-live.png" style="max-width:360px;width:90vw;background:#fff;padding:12px;border-radius:8px"/>
<script>
const img=document.getElementById('qr'); const t=document.getElementById('t');
setInterval(()=>{ img.src='waweb-qr-live.png?t='+Date.now(); t.textContent='Atualizado: '+new Date().toLocaleTimeString(); }, 1200);
</script>
</body></html>
